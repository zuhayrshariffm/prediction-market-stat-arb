services:
  postgres:
    image: postgres:16
    container_name: predict_stat_arb_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: predict_stat_arb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/predict_stat_arb/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
